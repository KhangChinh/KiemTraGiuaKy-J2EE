<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học phần - ĐKHP Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f23;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .navbar-brand .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #eab308, #f59e0b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .navbar-brand .brand-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover { color: #e2e8f0; background: rgba(234, 179, 8, 0.1); }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fde047;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info .avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #eab308, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        .logout-form {
            display: inline;
        }

        .logout-form button {
            padding: 7px 16px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .logout-form button:hover { background: rgba(239, 68, 68, 0.25); }

        .role-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(234, 179, 8, 0.2);
            color: #fde047;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        /* Content */
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-add {
            padding: 10px 22px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.35);
        }

        /* Alert */
        .alert {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.88rem;
            font-weight: 500;
            animation: fadeIn 0.4s ease;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Table */
        .table-container {
            background: rgba(30, 30, 60, 0.6);
            border: 1px solid rgba(234, 179, 8, 0.15);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: rgba(234, 179, 8, 0.1);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: #fde047;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.2);
        }

        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.08);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tbody tr { transition: background 0.2s ease; }
        tbody tr:hover { background: rgba(99, 102, 241, 0.05); }
        tbody tr:last-child td { border-bottom: none; }

        .course-img {
            width: 80px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-edit {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }

        .btn-edit:hover { background: rgba(99, 102, 241, 0.25); }

        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .btn-delete:hover { background: rgba(239, 68, 68, 0.25); }

        .category-badge {
            background: rgba(192, 132, 252, 0.15);
            color: #c084fc;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .credits-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .table-container { overflow-x: auto; }
            table { min-width: 700px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        /* Search */
        .search-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .search-form { display: flex; flex: 1; max-width: 400px; }
        .search-form input { flex: 1; padding: 9px 14px; background: rgba(15,15,35,0.8); border: 1px solid rgba(234,179,8,0.2); border-radius: 10px 0 0 10px; color: #e2e8f0; font-size: 0.88rem; font-family: 'Inter',sans-serif; outline: none; transition: border-color 0.3s; }
        .search-form input:focus { border-color: #eab308; }
        .search-form input::placeholder { color: #475569; }
        .search-form button { padding: 9px 16px; background: linear-gradient(135deg, #eab308, #f59e0b); border: none; border-radius: 0 10px 10px 0; color: white; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .search-form button:hover { opacity: 0.9; }
        .search-tag { color: #94a3b8; font-size: 0.88rem; }
        .search-tag a { color: #fde047; text-decoration: none; margin-left: 8px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-content">
        <a href="/admin/courses" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <span class="brand-text">ĐKHP Admin</span>
        </a>
        <div class="navbar-links">
            <a href="/" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="/profile" class="user-info" style="text-decoration:none;">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <span sec:authentication="name">Admin</span>
                <span class="role-badge">Admin</span>
            </a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-book"></i> Quản lý Học phần</h1>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <a href="/admin/courses/add" class="btn-add">
                <i class="fas fa-plus"></i> Thêm học phần
            </a>
            <a href="/admin/categories" class="btn-add" style="background: linear-gradient(135deg, #8b5cf6, #6366f1);">
                <i class="fas fa-folder"></i> Quản lý danh mục
            </a>
        </div>
    </div>

    <!-- Search -->
    <div class="search-row">
        <form class="search-form" th:action="@{/admin/courses}" method="get">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm học phần...">
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
        <div class="search-tag" th:if="${keyword != null && !keyword.isEmpty()}">
            Kết quả: <strong th:text="${#lists.size(courses)}">0</strong> học phần
            <a href="/admin/courses"><i class="fas fa-times"></i> Xóa bộ lọc</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${param.added}">
        <i class="fas fa-check-circle"></i> Thêm học phần thành công!
    </div>
    <div class="alert alert-success" th:if="${param.updated}">
        <i class="fas fa-check-circle"></i> Cập nhật học phần thành công!
    </div>
    <div class="alert alert-danger" th:if="${param.deleted}">
        <i class="fas fa-trash"></i> Đã xóa học phần!
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hình ảnh</th>
                    <th>Tên học phần</th>
                    <th>Tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Danh mục</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course, iter : ${courses}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td>
                        <img class="course-img"
                             th:src="${course.image != null && !course.image.isEmpty()} ? ${course.image} : 'https://via.placeholder.com/80x50'"
                             th:alt="${course.name}">
                    </td>
                    <td th:text="${course.name}">Tên</td>
                    <td><span class="credits-badge" th:text="${course.credits}">3</span></td>
                    <td th:text="${course.lecturer}">GV</td>
                    <td>
                        <span class="category-badge" th:if="${course.category != null}" th:text="${course.category.name}">Cat</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn-edit">
                                <i class="fas fa-edit"></i> Sửa
                            </a>
                            <a th:if="${enrollCountMap[course.id] == 0}"
                               th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn-delete"
                               onclick="return confirm('Bạn có chắc muốn xóa học phần này?')">
                                <i class="fas fa-trash"></i> Xóa
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
