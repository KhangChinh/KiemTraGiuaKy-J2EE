<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'DS Sinh viên - ' + ${course.name}">DS Sinh viên</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #e2e8f0; min-height: 100vh; }

        .navbar { background: rgba(15,15,35,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(234,179,8,0.3); padding: 0 2rem; position: sticky; top: 0; z-index: 1000; }
        .navbar-content { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .navbar-brand .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .navbar-brand .brand-text { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .navbar-links { display: flex; align-items: center; gap: 8px; }
        .nav-link { padding: 8px 16px; border-radius: 10px; text-decoration: none; color: #94a3b8; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease; }
        .nav-link:hover { color: #e2e8f0; background: rgba(234,179,8,0.1); }
        .user-info { display: flex; align-items: center; gap: 8px; color: #fde047; font-weight: 600; font-size: 0.9rem; text-decoration: none; }
        .user-info .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .role-badge { padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: rgba(234,179,8,0.2); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
        .logout-form { display: inline; }
        .logout-form button { padding: 7px 16px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; font-weight: 500; font-size: 0.85rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .logout-form button:hover { background: rgba(239,68,68,0.25); }

        .main-content { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .course-info-badge { background: rgba(99,102,241,0.15); color: #818cf8; padding: 6px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; }
        .btn-back { padding: 10px 22px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #818cf8; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: rgba(99,102,241,0.25); }

        .table-container { background: rgba(30,30,60,0.6); border: 1px solid rgba(234,179,8,0.15); border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: rgba(234,179,8,0.1); padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.85rem; color: #fde047; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(234,179,8,0.2); }
        tbody td { padding: 14px 16px; border-bottom: 1px solid rgba(99,102,241,0.08); font-size: 0.9rem; vertical-align: middle; }
        tbody tr { transition: background 0.2s ease; }
        tbody tr:hover { background: rgba(99,102,241,0.05); }
        tbody tr:last-child td { border-bottom: none; }

        .student-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .student-avatar-default { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }

        .empty-state { text-align: center; padding: 3rem 2rem; color: #64748b; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #334155; }

        @media (max-width: 768px) {
            .table-container { overflow-x: auto; }
            table { min-width: 500px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-content">
        <a href="/admin/courses" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <span class="brand-text">ĐKHP Admin</span>
        </a>
        <div class="navbar-links">
            <a href="/" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="/admin/courses" class="nav-link"><i class="fas fa-book"></i> Học phần</a>
            <a href="/profile" class="user-info">
                <img th:if="${currentUser != null && currentUser.image != null && !currentUser.image.isEmpty()}"
                     th:src="${currentUser.image}" alt="Avatar"
                     style="width:34px;height:34px;border-radius:50%;object-fit:cover;">
                <div class="avatar" th:if="${currentUser == null || currentUser.image == null || currentUser.image.isEmpty()}"><i class="fas fa-user"></i></div>
                <span sec:authentication="name">Admin</span>
                <span class="role-badge">Admin</span>
            </a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="fas fa-users"></i> Danh sách Sinh viên đăng ký</h1>
            <div style="margin-top: 8px;">
                <span class="course-info-badge">
                    <i class="fas fa-book"></i> <span th:text="${course.name}">Tên học phần</span>
                </span>
                <span class="course-info-badge" style="margin-left: 6px;">
                    <span th:text="${#lists.size(enrollments)} + ' sinh viên'">0 sinh viên</span>
                </span>
            </div>
        </div>
        <a href="/admin/courses" class="btn-back">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </div>

    <div class="table-container" th:if="${#lists.size(enrollments) > 0}">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ảnh</th>
                    <th>Mã SV</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Ngày đăng ký</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="enrollment, iter : ${enrollments}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td>
                        <img th:if="${enrollment.student.image != null && !enrollment.student.image.isEmpty()}"
                             th:src="${enrollment.student.image}" class="student-avatar" alt="Avatar">
                        <div th:if="${enrollment.student.image == null || enrollment.student.image.isEmpty()}"
                             class="student-avatar-default">
                            <i class="fas fa-user"></i>
                        </div>
                    </td>
                    <td th:text="${enrollment.student.studentId}">1</td>
                    <td th:text="${enrollment.student.username}">username</td>
                    <td th:text="${enrollment.student.email}">email</td>
                    <td th:text="${enrollment.enrollDate}">2026-01-01</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" th:if="${#lists.size(enrollments) == 0}">
        <i class="fas fa-users-slash"></i>
        <h3>Chưa có sinh viên đăng ký</h3>
    </div>
</main>

</body>
</html>
