<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Danh mục - ĐKHP Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #e2e8f0; min-height: 100vh; }

        .navbar { background: rgba(15,15,35,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(234,179,8,0.3); padding: 0 2rem; position: sticky; top: 0; z-index: 1000; }
        .navbar-content { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .navbar-brand .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .navbar-brand .brand-text { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .navbar-links { display: flex; align-items: center; gap: 8px; }
        .nav-link { padding: 8px 16px; border-radius: 10px; text-decoration: none; color: #94a3b8; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease; }
        .nav-link:hover { color: #e2e8f0; background: rgba(234,179,8,0.1); }
        .user-info { display: flex; align-items: center; gap: 8px; color: #fde047; font-weight: 600; font-size: 0.9rem; }
        .user-info .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .role-badge { padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: rgba(234,179,8,0.2); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
        .logout-form { display: inline; }
        .logout-form button { padding: 7px 16px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; font-weight: 500; font-size: 0.85rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .logout-form button:hover { background: rgba(239,68,68,0.25); }

        .main-content { max-width: 600px; margin: 0 auto; padding: 2rem; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .page-subtitle { color: #64748b; font-size: 0.9rem; }

        .form-card { background: rgba(30,30,60,0.6); border: 1px solid rgba(234,179,8,0.15); border-radius: 16px; padding: 2rem; }
        .alert { padding: 12px 18px; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.88rem; font-weight: 500; }
        .alert-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 6px; color: #94a3b8; font-weight: 500; font-size: 0.88rem; }
        .form-group input { width: 100%; padding: 12px 14px; background: rgba(15,15,35,0.8); border: 1px solid rgba(234,179,8,0.2); border-radius: 12px; color: #e2e8f0; font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .form-group input:focus { outline: none; border-color: #eab308; box-shadow: 0 0 0 3px rgba(234,179,8,0.15); }

        .form-actions { display: flex; gap: 12px; margin-top: 1.5rem; }
        .btn-submit { flex: 1; padding: 13px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.3s ease; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.35); }
        .btn-cancel { flex: 1; padding: 13px; background: rgba(100,116,139,0.15); border: 1px solid rgba(100,116,139,0.3); color: #94a3b8; border-radius: 12px; font-size: 1rem; font-weight: 600; text-decoration: none; text-align: center; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .btn-cancel:hover { background: rgba(100,116,139,0.25); color: #e2e8f0; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-content">
        <a href="/admin/courses" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <span class="brand-text">ĐKHP Admin</span>
        </a>
        <div class="navbar-links">
            <a href="/" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
            <div class="user-info">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <span sec:authentication="name">Admin</span>
                <span class="role-badge">Admin</span>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-edit"></i> Sửa Danh mục</h1>
        <p class="page-subtitle">Chỉnh sửa thông tin danh mục</p>
    </div>

    <div class="form-card">
        <div class="alert alert-danger" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Lỗi</span>
        </div>

        <form th:action="@{/admin/categories/edit/{id}(id=${category.id})}" method="post" th:object="${category}">
            <div class="form-group">
                <label for="name"><i class="fas fa-tag"></i> Tên danh mục</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên danh mục..." required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> Cập nhật
                </button>
                <a href="/admin/categories" class="btn-cancel">Hủy</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
