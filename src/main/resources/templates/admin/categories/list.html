<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục - ĐKHP Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #e2e8f0; min-height: 100vh; }

        .navbar { background: rgba(15,15,35,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(234,179,8,0.3); padding: 0 2rem; position: sticky; top: 0; z-index: 1000; }
        .navbar-content { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .navbar-brand .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .navbar-brand .brand-text { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .navbar-links { display: flex; align-items: center; gap: 8px; }
        .nav-link { padding: 8px 16px; border-radius: 10px; text-decoration: none; color: #94a3b8; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease; }
        .nav-link:hover { color: #e2e8f0; background: rgba(234,179,8,0.1); }
        .nav-link.active { color: #fde047; background: rgba(234,179,8,0.15); }
        .user-info { display: flex; align-items: center; gap: 8px; color: #fde047; font-weight: 600; font-size: 0.9rem; }
        .user-info .avatar { width: 34px; height: 34px; background: linear-gradient(135deg, #eab308, #f59e0b); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .role-badge { padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: rgba(234,179,8,0.2); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
        .logout-form { display: inline; }
        .logout-form button { padding: 7px 16px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; font-weight: 500; font-size: 0.85rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .logout-form button:hover { background: rgba(239,68,68,0.25); }

        .main-content { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-add { padding: 10px 22px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34,197,94,0.35); }
        .btn-back { padding: 10px 22px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #818cf8; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: rgba(99,102,241,0.25); }

        .alert { padding: 12px 18px; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.88rem; font-weight: 500; animation: fadeIn 0.4s ease; }
        .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
        .alert-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .table-container { background: rgba(30,30,60,0.6); border: 1px solid rgba(234,179,8,0.15); border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: rgba(234,179,8,0.1); padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.85rem; color: #fde047; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(234,179,8,0.2); }
        tbody td { padding: 14px 16px; border-bottom: 1px solid rgba(99,102,241,0.08); font-size: 0.9rem; vertical-align: middle; }
        tbody tr { transition: background 0.2s ease; }
        tbody tr:hover { background: rgba(99,102,241,0.05); }
        tbody tr:last-child td { border-bottom: none; }

        .actions { display: flex; gap: 8px; }
        .btn-edit, .btn-delete { padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 5px; }
        .btn-edit { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #818cf8; }
        .btn-edit:hover { background: rgba(99,102,241,0.25); }
        .btn-delete { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,0.25); }

        .course-count-badge { background: rgba(99,102,241,0.15); color: #818cf8; padding: 3px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; }

        .empty-state { text-align: center; padding: 3rem 2rem; color: #64748b; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #334155; }
        .empty-state h3 { color: #94a3b8; margin-bottom: 0.5rem; }

        @media (max-width: 768px) {
            .table-container { overflow-x: auto; }
            table { min-width: 500px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-content">
        <a href="/admin/courses" class="navbar-brand">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <span class="brand-text">ĐKHP Admin</span>
        </a>
        <div class="navbar-links">
            <a href="/" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="/admin/courses" class="nav-link"><i class="fas fa-book"></i> Học phần</a>
            <a href="/admin/categories" class="nav-link active"><i class="fas fa-folder"></i> Danh mục</a>
            <a href="/profile" class="user-info" style="text-decoration:none;">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <span sec:authentication="name">Admin</span>
                <span class="role-badge">Admin</span>
            </a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-folder-open"></i> Quản lý Danh mục</h1>
        <div class="header-buttons">
            <a href="/admin/categories/add" class="btn-add">
                <i class="fas fa-plus"></i> Thêm danh mục
            </a>
            <a href="/admin/courses" class="btn-back">
                <i class="fas fa-arrow-left"></i> Quản lý học phần
            </a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${success}">
        <i class="fas fa-check-circle"></i> <span th:text="${success}">Thành công</span>
    </div>
    <div class="alert alert-danger" th:if="${error}">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Lỗi</span>
    </div>

    <div class="table-container" th:if="${#lists.size(categories) > 0}">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Tên danh mục</th>
                    <th>Số học phần</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat, iter : ${categories}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td th:text="${cat.name}">Tên</td>
                    <td>
                        <span class="course-count-badge" th:text="${courseCountMap[cat.id]}">0</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn-edit">
                                <i class="fas fa-edit"></i> Sửa
                            </a>
                            <!-- Chỉ hiện nút xóa nếu danh mục không có học phần nào -->
                            <a th:if="${courseCountMap[cat.id] == 0}"
                               th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" class="btn-delete"
                               onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                                <i class="fas fa-trash"></i> Xóa
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" th:if="${#lists.size(categories) == 0}">
        <i class="fas fa-folder-open"></i>
        <h3>Chưa có danh mục nào</h3>
        <p>Hãy thêm danh mục đầu tiên cho hệ thống.</p>
    </div>
</main>

</body>
</html>
