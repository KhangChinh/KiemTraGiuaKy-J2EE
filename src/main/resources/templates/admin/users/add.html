<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản - ĐKHP Admin</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f23;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .navbar-brand .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #eab308, #f59e0b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .navbar-brand .brand-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fde047;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info .avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #eab308, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        .role-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(234, 179, 8, 0.2);
            color: #fde047;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-card {
            background: rgba(30, 30, 60, 0.6);
            border: 1px solid rgba(234, 179, 8, 0.15);
            border-radius: 16px;
            padding: 2rem;
        }

        .alert-danger {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.88rem;
            font-weight: 500;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.88rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid rgba(234, 179, 8, 0.2);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.15);
        }

        .form-group select option {
            background: #1e1e3c;
            color: #e2e8f0;
        }

        .role-checkboxes {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .role-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(15, 15, 35, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-checkbox:hover {
            border-color: rgba(99, 102, 241, 0.4);
        }

        .role-checkbox input[type="checkbox"],
        .role-checkbox input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        .role-checkbox span {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .role-admin {
            border-color: rgba(234, 179, 8, 0.3);
        }

        .role-admin span {
            color: #fde047;
        }

        .role-student {
            border-color: rgba(34, 197, 94, 0.3);
        }

        .role-student span {
            color: #86efac;
        }

        .role-teacher {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .role-teacher span {
            color: #93c5fd;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 1.5rem;
        }

        .btn-submit {
            flex: 1;
            padding: 13px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.35);
        }

        .btn-cancel {
            flex: 1;
            padding: 13px;
            background: rgba(100, 116, 139, 0.15);
            border: 1px solid rgba(100, 116, 139, 0.3);
            color: #94a3b8;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            background: rgba(100, 116, 139, 0.25);
            color: #e2e8f0;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-content">
            <a href="/admin/courses" class="navbar-brand">
                <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
                <span class="brand-text">ĐKHP Admin</span>
            </a>
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="/admin/courses" class="nav-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
                <a href="/profile" class="user-info" style="text-decoration:none;">
                    <img th:if="${currentUser != null && currentUser.image != null && !currentUser.image.isEmpty()}"
                        th:src="${currentUser.image}" alt="Avatar"
                        style="width:34px;height:34px;border-radius:50%;object-fit:cover;">
                    <div class="avatar"
                        th:if="${currentUser == null || currentUser.image == null || currentUser.image.isEmpty()}"><i
                            class="fas fa-user"></i></div>
                    <span sec:authentication="name">Admin</span>
                    <span class="role-badge">Admin</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title"><i class="fas fa-user-plus"></i> Tạo tài khoản mới</h1>
        <p class="page-subtitle">Đăng ký tài khoản mới với quyền tùy chọn</p>

        <div class="form-card">
            <div class="alert-danger" th:if="${error}">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Lỗi</span>
            </div>

            <form th:action="@{/admin/users/add}" method="post">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Tên đăng nhập *</label>
                    <input type="text" id="username" name="username" th:value="${username}"
                        placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" id="email" name="email" th:value="${email}" placeholder="Nhập email" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Mật khẩu *</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Xác nhận mật khẩu *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu"
                        required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i> Vai trò *</label>
                    <div class="role-checkboxes">
                        <label th:each="role : ${roles}" class="role-checkbox"
                            th:classappend="${role.name == 'ADMIN'} ? 'role-admin' : (${role.name == 'LECTURER'} ? 'role-teacher' : 'role-student')">
                            <input type="radio" name="roleId" th:value="${role.roleId}"
                                th:checked="${role.name == 'STUDENT'}">
                            <span th:text="${role.name}">ROLE</span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> Tạo tài khoản
                    </button>
                    <a href="/admin/courses" class="btn-cancel">Hủy</a>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
